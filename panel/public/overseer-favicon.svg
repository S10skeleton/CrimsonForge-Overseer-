  </defs>
  <polygon points="16,1.5 28.6,8.75 28.6,23.25 16,30.5 3.4,23.25 3.4,8.75"
           fill="#141233" stroke="#C0302A" stroke-width="2.6" stroke-linejoin="round"/>
  <circle cx="16" cy="16" r="6" fill="none" stroke="#3f6dff" stroke-width="1" opacity="0.7"/>
  <circle cx="16" cy="16" r="4.2" fill="url(#core)"/>
  <circle cx="16" cy="16" r="1.7" fill="#f2feff"/>
</svg>
