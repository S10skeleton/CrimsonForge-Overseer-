    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eafdff"/>
      <stop offset="45%" stop-color="#5fd5ff"/>
      <stop offset="100%" stop-color="#2aa8ee"/>
